<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>
  <title>Appraise 🎉 chaos vote</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    /* ===== CHAOS MODE: loud, clashing, wobbling ===== */
    @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Comic+Neue:wght@700&family=Space+Grotesk:wght@400;700&display=swap');

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,0,200,.30), transparent 42%),
        radial-gradient(circle at 88% 22%, rgba(0,255,225,.28), transparent 42%),
        radial-gradient(circle at 25% 85%, rgba(255,230,0,.22), transparent 45%),
        radial-gradient(circle at 80% 80%, rgba(120,80,255,.30), transparent 45%),
        #0a0118;
      background-attachment: fixed;
      overflow-x: hidden;
    }
    .funky { font-family: 'Bungee', 'Comic Neue', cursive; }
    .comic { font-family: 'Comic Neue', cursive; }

    /* animated rainbow text */
    @keyframes hue { 0%{filter:hue-rotate(0)} 100%{filter:hue-rotate(360deg)} }
    .rainbow {
      background: linear-gradient(90deg,#ff3cac,#ffeb3b,#2afadf,#7c4dff,#ff3cac);
      background-size: 300% 100%;
      -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: hue 6s linear infinite, slide 8s linear infinite;
    }
    @keyframes slide { 0%{background-position:0 0} 100%{background-position:300% 0} }

    @keyframes wobble {
      0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)}
    }
    @keyframes bounce2 {
      0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)}
    }
    @keyframes jiggle {
      0%,100%{transform:rotate(0)} 25%{transform:rotate(-3deg) scale(1.03)}
      75%{transform:rotate(3deg) scale(1.03)}
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-9px) rotate(-2deg)}
      40%{transform:translateX(9px) rotate(2deg)} 60%{transform:translateX(-6px)}
      80%{transform:translateX(6px)}
    }
    @keyframes spin-slow { 100%{transform:rotate(360deg)} }
    @keyframes pop { 0%{transform:scale(.6)} 60%{transform:scale(1.15)} 100%{transform:scale(1)} }

    .wobble:hover { animation: wobble .35s ease-in-out infinite; }
    .bouncy:hover { animation: bounce2 .5s ease-in-out infinite; }
    .jiggly:hover { animation: jiggle .4s ease-in-out infinite; }
    .shake { animation: shake .45s ease-in-out 1; }
    .pop-in { animation: pop .35s cubic-bezier(.2,1.4,.5,1) 1; }
    .spin-slow { animation: spin-slow 9s linear infinite; display:inline-block; }

    .neon-card {
      border: 3px solid;
      border-image: linear-gradient(120deg,#ff3cac,#2afadf,#ffeb3b,#7c4dff) 1;
      box-shadow: 0 0 0 2px rgba(0,0,0,.4), 8px 8px 0 rgba(255,60,172,.45);
      background: rgba(20,4,40,.78);
      backdrop-filter: blur(2px);
    }
    .chunky-btn {
      border: 3px solid #0a0118;
      box-shadow: 4px 4px 0 #0a0118;
      transition: transform .08s ease, box-shadow .08s ease;
      font-weight: 800;
    }
    .chunky-btn:active { transform: translate(4px,4px); box-shadow: 0 0 0 #0a0118; }

    .tilt-1 { transform: rotate(-1.2deg); } .tilt-2 { transform: rotate(1deg); }
    .tilt-3 { transform: rotate(-.6deg); }

    /* confetti */
    .confetti-pc {
      position: fixed; top: -20px; width: 12px; height: 12px; z-index: 9999;
      will-change: transform; pointer-events: none;
    }
    @keyframes fall {
      0% { transform: translateY(-20px) rotate(0); opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 1; }
    }
    ::-webkit-scrollbar { width: 12px; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(#ff3cac,#2afadf); border-radius: 8px; }
    .badge { font-weight:800; letter-spacing:.02em; }
  </style>
</head>
<body class="text-zinc-100 min-h-screen p-4 sm:p-6">

  <header class="max-w-3xl mx-auto mb-6 text-center select-none">
    <h1 class="funky text-4xl sm:text-6xl rainbow drop-shadow-[0_3px_0_rgba(0,0,0,.6)] cursor-pointer"
        id="logo">🎉 APPRAISE 🗳️</h1>
    <p class="comic text-lg text-yellow-300 mt-1 -rotate-1">vote for the apps you LOVE… no funny business 👀</p>
    <div id="staging-flag" class="hidden mt-2 inline-block bg-pink-600 text-white badge px-3 py-1 rounded-full tilt-2 text-sm">⚠️ STAGING SANDBOX — fake data ahoy</div>
  </header>

  <main id="app" class="max-w-3xl mx-auto"></main>

  <footer class="max-w-3xl mx-auto mt-10 text-center comic text-zinc-500 text-sm">
    built with chaos &amp; confetti · your individual ballot stays secret 🤐
  </footer>

  <script>
    // ----- token bootstrap (forward platform JWT on every fetch) -----
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const authHeaders = token ? { 'x-usernode-token': token } : {};

    let ME = null;

    async function api(path, opts = {}) {
      const res = await fetch(path, {
        ...opts,
        headers: {
          'Content-Type': 'application/json',
          ...authHeaders,
          ...(opts.headers || {}),
        },
      });
      let data = {};
      try { data = await res.json(); } catch (_) {}
      if (!res.ok) {
        const err = new Error(data.error || ('Request failed (' + res.status + ')'));
        err.status = res.status;
        throw err;
      }
      return data;
    }

    const $ = (sel, root = document) => root.querySelector(sel);
    const esc = (s) => String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

    const EMOJI = ['🎉','🚀','🔥','💥','🌈','⚡','🎊','✨','🤪','🥳','👾','🦄','🍕','💖','🎈'];
    const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

    // ----- confetti -----
    function confetti(n = 90) {
      const colors = ['#ff3cac','#2afadf','#ffeb3b','#7c4dff','#33ff8c','#ff7a00'];
      for (let i = 0; i < n; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-pc';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = pick(colors);
        p.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
        const dur = 1.6 + Math.random() * 1.8;
        p.style.animation = `fall ${dur}s linear ${Math.random() * .4}s forwards`;
        p.style.transform = `scale(${0.6 + Math.random()})`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), (dur + .6) * 1000);
      }
    }

    function shake(el) {
      if (!el) return;
      el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake');
    }

    function toast(msg, ok = true) {
      const t = document.createElement('div');
      t.className = 'fixed left-1/2 -translate-x-1/2 bottom-6 z-[9998] px-5 py-3 rounded-2xl badge chunky-btn pop-in ' +
        (ok ? 'bg-emerald-400 text-emerald-950' : 'bg-pink-500 text-white');
      t.textContent = (ok ? '✅ ' : '💢 ') + msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.transition = 'opacity .4s'; t.style.opacity = '0'; }, 2600);
      setTimeout(() => t.remove(), 3100);
    }

    // ----- tiny router (pathname based; server serves index.html for any path) -----
    function go(path) {
      history.pushState({}, '', path);
      render();
    }
    window.addEventListener('popstate', render);

    function statusBadge(status) {
      const map = {
        open:   ['🟢 OPEN', 'bg-emerald-400 text-emerald-950'],
        draft:  ['📝 DRAFT', 'bg-yellow-300 text-yellow-900'],
        closed: ['🔒 CLOSED', 'bg-fuchsia-400 text-fuchsia-950'],
      };
      const pair = map[status] || ['?', 'bg-zinc-400 text-black'];
      return `<span class="badge ${pair[1]} px-2.5 py-1 rounded-full text-xs">${pair[0]}</span>`;
    }
    const audLabel = (a) => a === 'invite' ? '🤫 Invited only' : '🌍 Everyone';

    const EMPTY_LIST_HTML = `<div class="neon-card rounded-3xl p-8 text-center comic text-xl text-zinc-300">
      No rounds yet… be the chaos you want to see 🌪️<br>Smash <b>CREATE A ROUND</b>!</div>`;

    // Confirm + DELETE a round, shared by the list cards and the detail view so
    // both entry points behave identically. Returns true on success, false if
    // the user cancelled or the request failed (error is toasted here).
    async function deleteRound(slug, title) {
      if (!window.confirm(`Delete the round "${title}"? This permanently removes the round, all its candidate apps, and every ballot. This cannot be undone.`)) {
        return false;
      }
      try {
        await api('/api/rounds/' + encodeURIComponent(slug), { method: 'DELETE' });
        toast('Round deleted');
        return true;
      } catch (e) {
        toast(e.message, false);
        return false;
      }
    }

    // =========================================================================
    // VIEW: round list
    // =========================================================================
    async function renderList(root) {
      root.innerHTML = `<div class="text-center comic text-2xl animate-pulse">loading the chaos… 🌀</div>`;
      let data;
      try { data = await api('/api/rounds'); }
      catch (e) { root.innerHTML = errBox(e); return; }

      const rounds = data.rounds || [];
      root.innerHTML = `
        <div class="flex items-center justify-between gap-3 mb-5 flex-wrap">
          <h2 class="funky text-2xl text-cyan-300 tilt-1">🎪 Voting Rounds</h2>
          <button id="new-btn" class="chunky-btn jiggly bg-gradient-to-r from-pink-500 to-yellow-400 text-black px-5 py-3 rounded-2xl text-lg">
            ➕ CREATE A ROUND
          </button>
        </div>
        <div id="rounds" class="space-y-4"></div>`;

      $('#new-btn', root).onclick = () => go('/create');

      const list = $('#rounds', root);
      if (!rounds.length) {
        list.innerHTML = EMPTY_LIST_HTML;
        return;
      }
      list.innerHTML = rounds.map((r, i) => `
        <div data-slug="${esc(r.slug)}" role="button" tabindex="0" class="round-row block w-full text-left neon-card rounded-3xl p-5 wobble tilt-${(i%3)+1} cursor-pointer">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="funky text-xl text-white">${pick(EMOJI)} ${esc(r.title)}</div>
              <div class="comic text-sm text-cyan-200 mt-1">
                ${audLabel(r.audience)} · 🗳️ ${r.votes_per_voter} vote(s) each · 📦 ${r.candidate_count} apps
                ${r.mine ? '· <span class="text-yellow-300">👑 yours</span>' : ''}
              </div>
            </div>
            <div class="flex items-center gap-2 shrink-0">
              ${statusBadge(r.status)}
            </div>
          </div>
        </div>`).join('');

      list.querySelectorAll('.round-row').forEach((el) => {
        const nav = () => go('/round/' + el.dataset.slug);
        el.onclick = nav;
        el.onkeydown = (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); nav(); }
        };
      });
    }

    function errBox(e) {
      return `<div class="neon-card rounded-3xl p-6 text-center comic text-lg text-pink-300">
        😬 ${esc(e.message)}<br>
        <button onclick="location.href='/'" class="chunky-btn bg-cyan-300 text-black px-4 py-2 rounded-xl mt-3">🏠 back home</button>
      </div>`;
    }

    // =========================================================================
    // VIEW: create form
    // =========================================================================
    // One selectable app row in the directory picker.
    function appOptRow(a, idx) {
      return `
        <label class="app-opt flex items-center gap-3 neon-card rounded-2xl p-3 cursor-pointer tilt-${(idx%3)+1}">
          <input type="checkbox" class="app-cb w-5 h-5 accent-emerald-400" data-id="${esc(a.id)}">
          <span class="funky text-white">${pick(EMOJI)} ${esc(a.name)}</span>
          ${a.slug ? `<span class="comic text-xs text-zinc-400 ml-auto break-all">${esc(a.slug)}</span>` : ''}
        </label>`;
    }

    function renderCreate(root) {
      root.innerHTML = `
        <button id="back" class="comic text-cyan-300 mb-3">⬅ back to rounds</button>
        <div class="neon-card rounded-3xl p-6">
          <h2 class="funky text-2xl text-yellow-300 mb-4 tilt-2">🛠️ Build a Voting Round</h2>

          <label class="comic text-cyan-200">Title *</label>
          <input id="f-title" class="w-full bg-black/40 border-2 border-cyan-400/60 rounded-xl px-3 py-2 mb-3 mt-1" placeholder="Best app of June 2026 🏆">

          <label class="comic text-cyan-200">Description</label>
          <textarea id="f-desc" rows="2" class="w-full bg-black/40 border-2 border-fuchsia-400/60 rounded-xl px-3 py-2 mb-3 mt-1" placeholder="what's this vote about?"></textarea>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-3">
            <div>
              <label class="comic text-cyan-200">Who can vote?</label>
              <select id="f-aud" class="w-full bg-black/40 border-2 border-emerald-400/60 rounded-xl px-3 py-2 mt-1">
                <option value="everyone">🌍 Everyone</option>
                <option value="invite">🤫 Invited only</option>
              </select>
            </div>
            <div>
              <label class="comic text-cyan-200">Votes per voter</label>
              <input id="f-vpv" type="number" min="1" max="100" value="1" class="w-full bg-black/40 border-2 border-yellow-400/60 rounded-xl px-3 py-2 mt-1">
            </div>
          </div>

          <div id="invite-wrap" class="hidden mb-3">
            <label class="comic text-cyan-200">Invited usernames (comma / space separated)</label>
            <textarea id="f-invitees" rows="2" class="w-full bg-black/40 border-2 border-purple-400/60 rounded-xl px-3 py-2 mt-1" placeholder="alice, bob, carol"></textarea>
          </div>

          <div class="mb-3">
            <label class="comic text-cyan-200">Vote distribution</label>
            <select id="f-rule" class="w-full bg-black/40 border-2 border-orange-400/60 rounded-xl px-3 py-2 mt-1">
              <option value="one_per_app">🎯 One vote per app (spread them out)</option>
              <option value="concentrate">🧮 Concentrate (all votes can go on one app)</option>
            </select>
          </div>

          <div id="spread-note" class="comic text-sm text-emerald-300 mb-4"></div>

          <label class="flex items-center gap-3 comic text-cyan-200 mb-4 cursor-pointer select-none neon-card rounded-2xl p-3">
            <input id="f-self-vote" type="checkbox" class="w-5 h-5 accent-pink-500">
            <span>🙋 Allow people to vote on their own app
              <span class="text-zinc-400 text-sm">(off by default — contributors can't vote for their own app)</span>
            </span>
          </label>

          <label class="flex items-center gap-3 comic text-cyan-200 mb-4 cursor-pointer select-none neon-card rounded-2xl p-3">
            <input id="f-require-tested" type="checkbox" class="w-5 h-5 accent-emerald-400">
            <span>🧪 Allow only people who tested all the apps in this round to vote
              <span class="text-zinc-400 text-sm">(off by default — voters must have used every app in the round)</span>
            </span>
          </label>

          <div class="flex items-center justify-between mb-2">
            <label class="comic text-cyan-200 text-lg">📦 Pick candidate apps (min 2)</label>
            <button id="reload-apps" class="chunky-btn bouncy bg-cyan-300 text-black px-3 py-1.5 rounded-xl">🔄 reload</button>
          </div>
          <div id="app-picker" class="space-y-2 mb-4 max-h-96 overflow-auto"></div>

          <button id="create" class="chunky-btn jiggly w-full bg-gradient-to-r from-emerald-400 via-yellow-300 to-pink-500 text-black text-xl py-4 rounded-2xl">
            🚀 CREATE ROUND (as draft)
          </button>
          <div id="c-err" class="comic text-pink-300 text-center mt-3"></div>
        </div>`;

      $('#back', root).onclick = () => go('/');

      // ----- directory picker -----
      const picker = $('#app-picker', root);
      const createBtn = $('#create', root);
      const selected = new Set(); // app ids the creator checked

      const setCreateEnabled = (on) => {
        createBtn.disabled = !on;
        createBtn.classList.toggle('opacity-50', !on);
        createBtn.classList.toggle('pointer-events-none', !on);
      };

      async function loadApps() {
        picker.innerHTML = `<div class="comic text-cyan-200 animate-pulse">loading apps from the directory… 🛰️</div>`;
        setCreateEnabled(false);
        try {
          const data = await api('/api/apps');
          const apps = data.apps || [];
          if (!apps.length) {
            picker.innerHTML = `<div class="comic text-yellow-300">😶 No apps found in the directory yet.</div>`;
            return;
          }
          picker.innerHTML = apps.map((a, i) => appOptRow(a, i)).join('');
          picker.querySelectorAll('.app-cb').forEach((cb) => {
            const id = parseInt(cb.dataset.id, 10);
            cb.checked = selected.has(id); // preserve selection across reloads
            cb.onchange = () => { cb.checked ? selected.add(id) : selected.delete(id); };
          });
          setCreateEnabled(true);
        } catch (e) {
          picker.innerHTML = `<div class="comic text-pink-300">😬 ${esc(e.message)}<br>
            Couldn't load the app list — <button id="retry-apps" class="underline text-cyan-300">try again</button>.</div>`;
          const rb = $('#retry-apps', picker);
          if (rb) rb.onclick = loadApps;
        }
      }
      $('#reload-apps', root).onclick = loadApps;
      loadApps();

      const vpv = $('#f-vpv', root);
      const ruleSel = $('#f-rule', root);
      const spreadNote = $('#spread-note', root);
      const updateSpread = () => {
        const n = Math.max(1, parseInt(vpv.value, 10) || 1);
        if (n <= 1) {
          spreadNote.textContent = '🗳️ 1 vote each — both distribution rules behave the same with a single vote.';
        } else if (ruleSel.value === 'concentrate') {
          spreadNote.textContent = `🧮 Concentrate: a voter may put all ${n} of their votes on one app.`;
        } else {
          spreadNote.textContent = `🎯 One vote per app: each app can get at most 1 of a voter's ${n} votes — they must spread out.`;
        }
      };
      vpv.oninput = updateSpread; ruleSel.onchange = updateSpread; updateSpread();

      const aud = $('#f-aud', root);
      aud.onchange = () => $('#invite-wrap', root).classList.toggle('hidden', aud.value !== 'invite');

      $('#create', root).onclick = async () => {
        const payload = {
          title: $('#f-title', root).value.trim(),
          description: $('#f-desc', root).value.trim(),
          audience: aud.value,
          votes_per_voter: parseInt(vpv.value, 10) || 1,
          vote_rule: ruleSel.value,
          invitees: $('#f-invitees', root).value,
          allow_self_vote: $('#f-self-vote', root).checked,
          require_tested_all: $('#f-require-tested', root).checked,
          candidate_app_ids: [...selected],
        };
        try {
          const out = await api('/api/rounds', { method: 'POST', body: JSON.stringify(payload) });
          confetti(120);
          toast('Round created! 🎉');
          if (out.warning) toast(out.warning, false);
          go('/round/' + out.round.slug);
        } catch (e) {
          $('#c-err', root).textContent = '💢 ' + e.message;
          shake($('#create', root));
        }
      };
    }

    // =========================================================================
    // VIEW: round detail (vote + results)
    // =========================================================================
    async function renderDetail(root, slug) {
      root.innerHTML = `<div class="text-center comic text-2xl animate-pulse">summoning the round… 🔮</div>`;
      let d;
      try { d = await api('/api/rounds/' + encodeURIComponent(slug)); }
      catch (e) { root.innerHTML = errBox(e); return; }

      const r = d.round;
      const cap = r.max_votes_per_app;
      const allowance = r.votes_per_voter;
      const alloc = {};
      d.candidates.forEach((c) => { alloc[c.id] = c.my_votes || 0; });

      root.innerHTML = `
        <button id="back" class="comic text-cyan-300 mb-3">⬅ back to rounds</button>
        <div class="neon-card rounded-3xl p-6 mb-5">
          <div class="flex items-start justify-between gap-3 flex-wrap">
            <div>
              <h2 class="funky text-2xl text-white">${pick(EMOJI)} ${esc(r.title)}</h2>
              <div class="comic text-cyan-200 mt-1">${audLabel(r.audience)} · 🗳️ ${allowance} vote(s) each · by @${esc(r.creator_username)}</div>
              <div class="comic text-sm mt-1 ${r.allow_self_vote ? 'text-emerald-300' : 'text-pink-300'}">${r.allow_self_vote ? '🙋 self-voting allowed' : '🚫 no self-voting — contributors can\'t vote for their own app'}</div>
              <div class="comic text-sm mt-1 text-orange-300">${r.vote_rule === 'concentrate' ? '🧮 concentrate allowed — you can put all your votes on one app' : '🎯 one vote per app — spread your votes across apps'}</div>
              ${r.require_tested_all ? `<div class="comic text-sm mt-1 text-emerald-300">🧪 testers only — you must try every app in this round to vote</div>` : ''}
            </div>
            ${statusBadge(r.status)}
          </div>
          ${r.description ? `<p class="comic text-zinc-300 mt-3">${esc(r.description)}</p>` : ''}
          <div id="creator-ctrls" class="mt-4 flex gap-2 flex-wrap"></div>
        </div>
        <div id="body"></div>`;

      $('#back', root).onclick = () => go('/');

      // creator controls
      const cc = $('#creator-ctrls', root);
      if (d.isCreator) {
        if (r.status === 'draft') {
          cc.innerHTML = `<button id="open-r" class="chunky-btn bouncy bg-emerald-400 text-black px-4 py-2 rounded-xl">🟢 Open voting</button>
            <span class="comic text-yellow-300 self-center">it's a draft — open it when ready!</span>`;
          $('#open-r', cc).onclick = async () => {
            try { await api('/api/rounds/' + slug + '/open', { method: 'POST' }); confetti(80); renderDetail(root, slug); }
            catch (e) { toast(e.message, false); }
          };
        } else if (r.status === 'open') {
          cc.innerHTML = `<button id="close-r" class="chunky-btn bg-fuchsia-400 text-black px-4 py-2 rounded-xl">🔒 Close round</button>
            <span class="comic text-cyan-200 self-center">you can peek at results anytime 👑</span>`;
          $('#close-r', cc).onclick = async () => {
            try { await api('/api/rounds/' + slug + '/close', { method: 'POST' }); renderDetail(root, slug); }
            catch (e) { toast(e.message, false); }
          };
        } else {
          cc.innerHTML = `<span class="comic text-fuchsia-300">round closed — results are public 🏆</span>`;
        }
      }

      // admin-only delete control — independent of creator status, set apart
      // from the open/close controls so it isn't hit by accident. Confirmation
      // is an in-app two-step prompt rather than window.confirm(): native
      // modals are suppressed in the platform's embedded iframe, so a
      // window.confirm() gate silently returns false and the delete never fires.
      if (ME && ME.is_admin) {
        // Admin-only: flip the testers-only restriction on this round live.
        const tWrap = document.createElement('div');
        tWrap.className = 'basis-full mt-1 pt-3 border-t-2 border-emerald-400/40';
        cc.appendChild(tWrap);
        const renderTesters = () => {
          const on = !!r.require_tested_all;
          tWrap.innerHTML = `
            <button id="tg-r" class="chunky-btn ${on ? 'bg-emerald-400 text-black' : 'bg-zinc-700 text-white'} px-4 py-2 rounded-xl">
              🧪 Testers-only voting: ${on ? 'On' : 'Off'}
            </button>
            <span class="comic text-emerald-200 text-sm self-center ml-2">admin · ${on ? 'click to allow everyone' : 'click to require testing all apps'}</span>`;
          const btn = $('#tg-r', tWrap);
          btn.onclick = async () => {
            if (btn.disabled) return;
            btn.disabled = true;
            try {
              const out = await api('/api/rounds/' + encodeURIComponent(slug) + '/require-tested',
                { method: 'POST', body: JSON.stringify({ enabled: !on }) });
              toast(out.round.require_tested_all ? 'Testers-only voting ON' : 'Testers-only voting OFF');
              renderDetail(root, slug);
            } catch (e) {
              toast(e.message, false);
              btn.disabled = false;
            }
          };
        };
        renderTesters();

        // Admin-only: flip the vote-distribution rule on this round live.
        // Non-retroactive — already-cast ballots are left untouched.
        const rWrap = document.createElement('div');
        rWrap.className = 'basis-full mt-1 pt-3 border-t-2 border-orange-400/40';
        cc.appendChild(rWrap);
        const renderRule = () => {
          const concentrate = r.vote_rule === 'concentrate';
          rWrap.innerHTML = `
            <button id="vr-r" class="chunky-btn ${concentrate ? 'bg-orange-400 text-black' : 'bg-zinc-700 text-white'} px-4 py-2 rounded-xl">
              ${concentrate ? '🧮 Vote rule: Concentrate' : '🎯 Vote rule: One per app'}
            </button>
            <span class="comic text-orange-200 text-sm self-center ml-2">admin · ${concentrate ? 'click to require one vote per app' : 'click to allow concentrating all votes on one app'}</span>`;
          const btn = $('#vr-r', rWrap);
          btn.onclick = async () => {
            if (btn.disabled) return;
            btn.disabled = true;
            try {
              const nextRule = concentrate ? 'one_per_app' : 'concentrate';
              const out = await api('/api/rounds/' + encodeURIComponent(slug) + '/vote-rule',
                { method: 'POST', body: JSON.stringify({ rule: nextRule }) });
              toast(out.round.vote_rule === 'concentrate' ? 'Vote rule: Concentrate' : 'Vote rule: One per app');
              renderDetail(root, slug);
            } catch (e) {
              toast(e.message, false);
              btn.disabled = false;
            }
          };
        };
        renderRule();

        // Admin-only: full edit form for the round's core details. Mirrors the
        // create form (minus the candidate picker); slug / status / candidates
        // are not editable. Non-retroactive — never rewrites cast ballots.
        const eWrap = document.createElement('div');
        eWrap.className = 'basis-full mt-1 pt-3 border-t-2 border-cyan-400/40';
        cc.appendChild(eWrap);

        const voteCount = (d.results && typeof d.results.voterCount === 'number') ? d.results.voterCount : 0;

        const renderEditIdle = () => {
          eWrap.innerHTML = `<button id="edit-r" class="chunky-btn bg-cyan-400 text-black px-4 py-2 rounded-xl">✏️ Edit round details</button>
            <span class="comic text-cyan-200 text-sm self-center ml-2">admin · title, description, audience & voting rules</span>`;
          $('#edit-r', eWrap).onclick = renderEditForm;
        };

        const renderEditForm = () => {
          eWrap.innerHTML = `
            <div class="neon-card rounded-2xl p-4 space-y-3">
              <div class="funky text-lg text-cyan-200">✏️ Edit round details</div>
              ${voteCount > 0 ? `<div class="comic text-sm text-yellow-300">⚠️ ${voteCount} ballot(s) already cast — changes apply from now on and won't alter existing votes.</div>` : ''}
              <div>
                <label class="comic text-cyan-200">Title</label>
                <input id="e-title" class="w-full bg-black/40 border-2 border-cyan-400/60 rounded-xl px-3 py-2 mt-1" value="${esc(r.title)}">
              </div>
              <div>
                <label class="comic text-cyan-200">Description</label>
                <textarea id="e-desc" rows="2" class="w-full bg-black/40 border-2 border-cyan-400/60 rounded-xl px-3 py-2 mt-1">${esc(r.description || '')}</textarea>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="comic text-cyan-200">Audience</label>
                  <select id="e-aud" class="w-full bg-black/40 border-2 border-emerald-400/60 rounded-xl px-3 py-2 mt-1">
                    <option value="everyone">🌍 Everyone</option>
                    <option value="invite">🤫 Invited only</option>
                  </select>
                </div>
                <div>
                  <label class="comic text-cyan-200">Votes per voter</label>
                  <input id="e-vpv" type="number" min="1" max="100" class="w-full bg-black/40 border-2 border-yellow-400/60 rounded-xl px-3 py-2 mt-1" value="${r.votes_per_voter}">
                </div>
              </div>
              <div id="e-invite-wrap">
                <label class="comic text-cyan-200">Invited usernames (comma / space separated)</label>
                <textarea id="e-invitees" rows="2" class="w-full bg-black/40 border-2 border-purple-400/60 rounded-xl px-3 py-2 mt-1" placeholder="alice, bob, carol">${esc((d.invitees || []).join(', '))}</textarea>
              </div>
              <div>
                <label class="comic text-cyan-200">Vote distribution</label>
                <select id="e-rule" class="w-full bg-black/40 border-2 border-orange-400/60 rounded-xl px-3 py-2 mt-1">
                  <option value="one_per_app">🎯 One vote per app (spread them out)</option>
                  <option value="concentrate">🧮 Concentrate (all votes can go on one app)</option>
                </select>
              </div>
              <div id="e-spread-note" class="comic text-sm text-emerald-300"></div>
              <label class="flex items-center gap-3 comic text-cyan-200 cursor-pointer select-none neon-card rounded-2xl p-3">
                <input id="e-self-vote" type="checkbox" class="w-5 h-5 accent-pink-500">
                <span>🙋 Allow people to vote on their own app</span>
              </label>
              <label class="flex items-center gap-3 comic text-cyan-200 cursor-pointer select-none neon-card rounded-2xl p-3">
                <input id="e-require-tested" type="checkbox" class="w-5 h-5 accent-emerald-400">
                <span>🧪 Allow only people who tested all the apps in this round to vote</span>
              </label>
              <div class="flex gap-2 flex-wrap">
                <button id="e-save" class="chunky-btn bg-cyan-400 text-black px-4 py-2 rounded-xl">💾 Save changes</button>
                <button id="e-cancel" class="chunky-btn bg-zinc-700 text-white px-4 py-2 rounded-xl">Cancel</button>
              </div>
              <div id="e-err" class="comic text-pink-300"></div>
            </div>`;

          const audSel = $('#e-aud', eWrap);
          audSel.value = r.audience === 'invite' ? 'invite' : 'everyone';
          const ruleSel = $('#e-rule', eWrap);
          ruleSel.value = r.vote_rule === 'concentrate' ? 'concentrate' : 'one_per_app';
          $('#e-self-vote', eWrap).checked = !!r.allow_self_vote;
          $('#e-require-tested', eWrap).checked = !!r.require_tested_all;

          const inviteWrap = $('#e-invite-wrap', eWrap);
          const syncInvite = () => inviteWrap.classList.toggle('hidden', audSel.value !== 'invite');
          audSel.onchange = syncInvite; syncInvite();

          const vpv = $('#e-vpv', eWrap);
          const note = $('#e-spread-note', eWrap);
          const updateSpread = () => {
            const n = Math.max(1, parseInt(vpv.value, 10) || 1);
            if (n <= 1) note.textContent = '🗳️ 1 vote each — both distribution rules behave the same with a single vote.';
            else if (ruleSel.value === 'concentrate') note.textContent = `🧮 Concentrate: a voter may put all ${n} of their votes on one app.`;
            else note.textContent = `🎯 One vote per app: each app can get at most 1 of a voter's ${n} votes — they must spread out.`;
          };
          vpv.oninput = updateSpread; ruleSel.onchange = updateSpread; updateSpread();

          $('#e-cancel', eWrap).onclick = renderEditIdle;
          const saveBtn = $('#e-save', eWrap);
          saveBtn.onclick = async () => {
            if (saveBtn.disabled) return;
            const title = $('#e-title', eWrap).value.trim();
            if (!title) { $('#e-err', eWrap).textContent = '💢 A title is required.'; shake(saveBtn); return; }
            saveBtn.disabled = true;
            saveBtn.textContent = '💾 Saving…';
            const payload = {
              title,
              description: $('#e-desc', eWrap).value.trim(),
              audience: audSel.value,
              votes_per_voter: parseInt(vpv.value, 10) || 1,
              vote_rule: ruleSel.value,
              invitees: $('#e-invitees', eWrap).value,
              allow_self_vote: $('#e-self-vote', eWrap).checked,
              require_tested_all: $('#e-require-tested', eWrap).checked,
            };
            try {
              const out = await api('/api/rounds/' + encodeURIComponent(slug),
                { method: 'PATCH', body: JSON.stringify(payload) });
              toast('Round updated ✨');
              if (out.warning) toast(out.warning, false);
              renderDetail(root, slug);
            } catch (e) {
              $('#e-err', eWrap).textContent = '💢 ' + e.message;
              toast(e.message, false);
              saveBtn.disabled = false;
              saveBtn.textContent = '💾 Save changes';
            }
          };
        };

        renderEditIdle();

        const wrap = document.createElement('div');
        wrap.className = 'basis-full mt-1 pt-3 border-t-2 border-pink-500/40';
        cc.appendChild(wrap);

        // Step 1: the resting Delete button.
        const renderIdle = () => {
          wrap.innerHTML = `<button id="del-r" class="chunky-btn bg-red-600 text-white px-4 py-2 rounded-xl">🗑️ Delete round</button>
            <span class="comic text-pink-300 text-sm self-center ml-2">admin · permanent</span>`;
          $('#del-r', wrap).onclick = renderConfirm;
        };

        // Step 2: in-app confirmation with explicit Yes/Cancel.
        const renderConfirm = () => {
          wrap.innerHTML = `
            <div class="comic text-pink-200 mb-2">⚠️ Delete the round "${esc(r.title)}"? This permanently removes the round, all its candidate apps, and every ballot. This cannot be undone.</div>
            <div class="flex gap-2 flex-wrap">
              <button id="del-yes" class="chunky-btn bg-red-600 text-white px-4 py-2 rounded-xl">🗑️ Yes, delete</button>
              <button id="del-no" class="chunky-btn bg-zinc-700 text-white px-4 py-2 rounded-xl">Cancel</button>
            </div>`;
          $('#del-no', wrap).onclick = renderIdle;
          const yes = $('#del-yes', wrap);
          yes.onclick = async () => {
            if (yes.disabled) return;        // guard against double-fire
            yes.disabled = true;
            yes.textContent = '🗑️ Deleting…';
            try {
              await api('/api/rounds/' + encodeURIComponent(slug), { method: 'DELETE' });
              toast('Round deleted');
              go('/');
            } catch (e) {
              toast(e.message, false);
              renderIdle();                  // restore so the admin can retry
            }
          };
        };

        renderIdle();
      }

      const body = $('#body', root);

      // ---- voting panel (only when open) ----
      if (r.status === 'open') {
        body.innerHTML = `
          <div class="sticky top-2 z-20 mb-4">
            <div id="tally" class="neon-card rounded-2xl px-4 py-3 text-center funky text-xl"></div>
          </div>
          <div id="cards" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
          <button id="submit" class="chunky-btn jiggly w-full mt-5 bg-gradient-to-r from-yellow-300 via-pink-500 to-cyan-400 text-black text-2xl py-4 rounded-2xl">
            🗳️ SUBMIT BALLOT 🎉
          </button>
          <div id="v-err" class="comic text-pink-300 text-center mt-3"></div>
          <p class="comic text-zinc-400 text-center text-sm mt-2">${r.vote_rule === 'concentrate' ? `you can put up to all ${allowance} on one app` : 'one vote per app — spread them out'} · your ballot is secret 🤐</p>`;

        const cardsEl = $('#cards', body);
        cardsEl.innerHTML = d.candidates.map((c, i) => {
          // is_own wins over the untested notice. "untested" only applies when
          // the server marked this candidate tested:false (require_tested_all
          // rounds where the viewer hasn't tested it / couldn't be verified).
          const untested = !c.is_own && c.tested === false;
          const dim = (c.is_own || untested) ? 'opacity-70' : '';
          const notice = untested
            ? (c.testedUnknown
                ? `<div class="comic text-pink-200 text-sm mt-2">⚠️ We couldn't verify whether you've tested this app — try again in a moment.</div>`
                : `<div class="comic text-yellow-300 text-sm mt-2">🧪 You haven't tested this app yet — try it before you can vote for it.</div>`)
            : '';
          const controls = c.is_own
            ? `<div class="comic text-yellow-300 mt-3">🚫 that's YOUR app — no self-voting, you sneaky genius 😏</div>`
            : untested
              ? `<div class="comic text-zinc-400 text-sm mt-3">🔒 voting locked until you test this app</div>`
              : `<div class="flex items-center justify-center gap-4 mt-3">
                   <button class="dec chunky-btn bg-pink-500 text-white w-11 h-11 rounded-full text-2xl leading-none">−</button>
                   <span class="cnt funky text-3xl w-10 text-center text-yellow-300">0</span>
                   <button class="inc chunky-btn bg-emerald-400 text-black w-11 h-11 rounded-full text-2xl leading-none">+</button>
                 </div>`;
          return `
          <div class="cand neon-card rounded-2xl p-4 tilt-${(i%3)+1} ${dim}" data-id="${c.id}">
            <div class="funky text-lg text-white">${pick(EMOJI)} ${esc(c.app_name)}</div>
            ${notice}
            ${c.app_url ? `<a href="${esc(c.app_url)}" target="_blank" rel="noopener" class="comic text-cyan-300 text-sm underline break-all">${esc(c.app_url)}</a>` : ''}
            ${c.owner_username ? `<div class="comic text-xs text-zinc-400 mt-0.5">by @${esc(c.owner_username)}</div>` : ''}
            ${controls}
          </div>`;
        }).join('');

        const tally = $('#tally', body);
        const total = () => Object.values(alloc).reduce((s, n) => s + n, 0);
        const refresh = () => {
          const used = total();
          const left = allowance - used;
          tally.innerHTML = `🎯 <span class="text-cyan-300">${used}</span> used · <span class="${left === 0 ? 'text-emerald-300' : 'text-yellow-300'}">${left}</span> left of <span class="text-pink-400">${allowance}</span>`;
          cardsEl.querySelectorAll('.cand').forEach((card) => {
            const id = +card.dataset.id;
            const cntEl = card.querySelector('.cnt');
            if (cntEl) cntEl.textContent = alloc[id] || 0;
          });
        };

        cardsEl.querySelectorAll('.cand').forEach((card) => {
          const id = +card.dataset.id;
          const inc = card.querySelector('.inc');
          const dec = card.querySelector('.dec');
          if (!inc) return; // own-app card has no steppers
          inc.onclick = () => {
            const used = total();
            if (used >= allowance) { toast('No votes left! 🫨', false); shake(card); return; }
            if ((alloc[id] || 0) >= cap) {
              toast(cap <= 1 ? 'One vote per app — spread it out! 🎯' : `Max ${cap} on one app! 🤹`, false);
              shake(card); return;
            }
            alloc[id] = (alloc[id] || 0) + 1; refresh();
          };
          dec.onclick = () => {
            if ((alloc[id] || 0) <= 0) return;
            alloc[id] -= 1; refresh();
          };
        });
        refresh();

        $('#submit', body).onclick = async () => {
          const allocation = Object.entries(alloc)
            .filter((pairEntry) => pairEntry[1] > 0)
            .map((pairEntry) => ({ candidate_id: +pairEntry[0], votes: pairEntry[1] }));
          try {
            await api('/api/rounds/' + slug + '/vote', { method: 'POST', body: JSON.stringify({ allocation }) });
            confetti(160);
            toast('Ballot submitted! 🥳 results unlocked');
            renderDetail(root, slug);
          } catch (e) {
            $('#v-err', body).textContent = '💢 ' + e.message;
            shake($('#submit', body));
            toast(e.message, false);
          }
        };

        // Testers-only gate: if this round restricts voting and the viewer
        // isn't eligible (or eligibility couldn't be verified), show the
        // disclaimer above the ballot and disable submit. Server-side is the
        // authoritative gate; this is the up-front UX.
        // Block only when we positively know the viewer isn't eligible, or the
        // check couldn't run (unverifiable). eligible:null with no unverifiable
        // flag means it wasn't checked (e.g. the creator) — don't block then.
        const elig = d.eligibility;
        // Fix C: if some candidate apps can't be gate-matched (no recognized
        // slug), say so plainly instead of silently behaving as ungated for
        // them. Shown to everyone (creator included), regardless of eligibility.
        if (elig && elig.requireTestedAll && (elig.unenforceableNames || []).length) {
          const note = document.createElement('div');
          note.className = 'neon-card rounded-2xl p-3 mb-4 comic text-center text-zinc-300 text-sm';
          note.innerHTML = `ℹ️ The testers-only rule can't be enforced for: <span class="text-yellow-300">${elig.unenforceableNames.map(esc).join(', ')}</span> — these apps aren't matched to the platform's tested-apps list, so voting on them isn't gated.`;
          body.insertBefore(note, body.firstChild);
        }
        if (elig && elig.requireTestedAll && (elig.eligible === false || elig.unverifiable)) {
          const submitBtn = $('#submit', body);
          if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'pointer-events-none');
          }
          const banner = document.createElement('div');
          banner.className = 'neon-card rounded-2xl p-4 mb-4 comic text-center text-pink-200';
          if (elig.unverifiable) {
            banner.innerHTML = `⚠️ We couldn't verify which apps you've tested right now — please try again in a moment.`;
          } else {
            const missing = (elig.missingNames || []);
            banner.innerHTML = `🧪 In order to vote on your favorite app, you have to test all the apps part of the voting round.
              ${missing.length ? `<div class="text-yellow-300 mt-2 text-sm">Still to try: ${missing.map(esc).join(', ')}</div>` : ''}`;
          }
          body.insertBefore(banner, body.firstChild);
        }

        // Already voted: voting is one-shot. Once the viewer has a ballot in
        // this round, lock the ballot (disable submit + steppers, keep the
        // pre-filled counts visible read-only) and show a banner up top. Added
        // last so its banner prepends ABOVE any testers-only note. The server
        // is the authoritative gate (POST /vote rejects a second ballot).
        if (d.hasVoted) {
          const submitBtn = $('#submit', body);
          if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'pointer-events-none');
          }
          cardsEl.querySelectorAll('.inc, .dec').forEach((b) => {
            b.disabled = true;
            b.classList.add('opacity-50', 'pointer-events-none');
          });
          const voted = document.createElement('div');
          voted.className = 'neon-card rounded-2xl p-4 mb-4 comic text-center text-emerald-200';
          voted.innerHTML = `🗳️ You already voted.
            <div class="text-zinc-300 mt-2 text-sm">Your ballot's locked in — results are below. 🎉</div>`;
          body.insertBefore(voted, body.firstChild);
        }
      } else if (r.status === 'draft') {
        body.innerHTML = `<div class="neon-card rounded-3xl p-8 text-center comic text-xl text-yellow-300">
          📝 This round is still a draft. Voting hasn't opened yet — check back soon! 🍿
          <div class="comic text-cyan-200 mt-3">Candidate apps (${d.candidates.length}):</div>
          <div class="mt-2 flex flex-wrap gap-2 justify-center">
            ${d.candidates.map((c) => `<span class="badge bg-purple-500/40 px-3 py-1 rounded-full">${esc(c.app_name)}</span>`).join('')}
          </div>
        </div>`;
      }

      // ---- results panel ----
      if (d.results) {
        const max = Math.max(1, ...d.results.candidates.map((c) => c.votes));
        const palette = ['from-pink-500 to-yellow-400','from-cyan-400 to-emerald-400','from-purple-500 to-pink-500','from-yellow-300 to-orange-500','from-emerald-400 to-cyan-400'];
        const medals = ['🥇','🥈','🥉'];
        const panel = document.createElement('div');
        panel.className = 'neon-card rounded-3xl p-6 mt-6';
        panel.innerHTML = `
          <h3 class="funky text-2xl text-cyan-300 mb-1 tilt-1">📊 RESULTS</h3>
          <p class="comic text-zinc-300 mb-4">${d.results.voterCount} brave voter(s) have spoken 🗣️</p>
          <div class="space-y-3">
            ${d.results.candidates.map((c, i) => `
              <div>
                <div class="flex justify-between comic text-sm mb-1">
                  <span>${medals[i] || '▪️'} ${esc(c.app_name)}</span>
                  <span class="text-yellow-300 funky">${c.votes}</span>
                </div>
                <div class="h-6 rounded-full bg-black/50 overflow-hidden border-2 border-black">
                  <div class="h-full bg-gradient-to-r ${palette[i % palette.length]} rounded-full transition-all"
                       style="width:${Math.round((c.votes / max) * 100)}%"></div>
                </div>
              </div>`).join('')}
          </div>`;
        body.appendChild(panel);
      } else if (r.status === 'open' && !d.isCreator) {
        const note = document.createElement('div');
        note.className = 'comic text-center text-zinc-400 mt-6';
        note.textContent = '🙈 Results are hidden until you cast your ballot — vote first!';
        body.appendChild(note);
      }

      // ---- slug footnote ----
      // Deliberately subtle: a faint, selectable monospace string at the very
      // bottom of the page (after voting + results). No label or button —
      // only noticeable to someone who knows to look for it, but enough to
      // copy a round's slug by hand (e.g. for the public leaderboard).
      const slugLine = document.createElement('div');
      slugLine.className = 'mt-8 text-center font-mono text-xs text-zinc-600';
      slugLine.textContent = r.slug;
      root.appendChild(slugLine);
    }

    // =========================================================================
    // Router dispatch
    // =========================================================================
    async function render() {
      const root = $('#app');
      const p = window.location.pathname;
      if (p === '/create') return renderCreate(root);
      const m = p.match(/^\/round\/(.+)$/);
      if (m) return renderDetail(root, decodeURIComponent(m[1]));
      return renderList(root);
    }

    // logo easter egg
    $('#logo').onclick = () => confetti(140);

    (async function boot() {
      try { ME = await api('/api/me'); } catch (_) {}
      // best-effort staging flag: seeded demo rounds only exist in staging
      try {
        const data = await api('/api/rounds');
        if ((data.rounds || []).some((r) => r.slug && r.slug.startsWith('staging-'))) {
          $('#staging-flag').classList.remove('hidden');
        }
      } catch (_) {}
      render();
    })();
  </script>
</body>
</html>
